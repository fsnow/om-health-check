# Reference: all metric thresholds with their built-in defaults.
#
# Copy this file, delete the metrics you don't want to override, and edit the
# rest. Unspecified fields on overridden metrics retain their defaults.
#
# Fields:
#   red             — value that triggers RED status (null = no absolute threshold)
#   warn            — value that triggers WARN status (null = no WARN threshold)
#   direction       — "above" (RED when value >= red) or "below" (RED when value <= red)
#   deviation       — baseline multiplier (e.g. 3.0 = RED if current >= 3x baseline)
#   relevance_floor — gate on the deviation check: it is ignored unless the current
#                     value is past this absolute floor (>= it for "above" metrics,
#                     <= it for "below"). Suppresses "3x of a tiny number" noise.
#                     Omit for no floor.
#   mode            — absolute | baseline | and | or  (see README for semantics)

thresholds:

  # -----------------------------------------------------------------------
  # Section 1: Connectivity & Infrastructure
  # -----------------------------------------------------------------------

  # System-level network throughput (host-wide, includes non-mongod traffic).
  # relevance_floor gates the 3x-deviation check: below 5 MB/s, a network spike
  # is routine workload churn, not a signal. Raise/lower per environment.
  SYSTEM_NETWORK_IN:
    deviation: 3.0
    relevance_floor: 5000000
    mode: baseline

  SYSTEM_NETWORK_OUT:
    deviation: 3.0
    relevance_floor: 5000000
    mode: baseline

  # mongod process-level network bytes and request count.
  NETWORK_BYTES_IN:
    deviation: 3.0
    relevance_floor: 5000000
    mode: baseline

  NETWORK_BYTES_OUT:
    deviation: 3.0
    relevance_floor: 5000000
    mode: baseline

  # Request count (ops/s) — floor in requests, not bytes.
  NETWORK_NUM_REQUESTS:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  # -----------------------------------------------------------------------
  # Section 2: Compute Resources
  # -----------------------------------------------------------------------

  # CPU user% — a genuine absolute concern, so mode=or fires on red/warn even
  # when steady (no deviation). relevance_floor gates the deviation branch so a
  # spike off a cold base (10% -> 20%) doesn't fire.
  SYSTEM_NORMALIZED_CPU_USER:
    red: 95.0
    warn: 80.0
    direction: above
    deviation: 2.0
    relevance_floor: 80.0
    mode: or

  # CPU iowait% — same: absolute concern OR a deviation above the floor.
  SYSTEM_NORMALIZED_CPU_IOWAIT:
    red: 20.0
    warn: 10.0
    direction: above
    deviation: 3.0
    relevance_floor: 10.0
    mode: or

  # mongod process CPU%.
  PROCESS_NORMALIZED_CPU_USER:
    red: 80.0
    direction: above
    deviation: 2.0
    relevance_floor: 50.0
    mode: or

  # Available memory (MB). Direction=below. RED if under 500 OR dropped to 30% of baseline.
  SYSTEM_MEMORY_AVAILABLE:
    red: 500
    warn: 1000
    direction: below
    deviation: 0.3
    mode: or

  # mongod resident memory (MB) — baseline-only (absolute size varies wildly).
  MEMORY_RESIDENT:
    deviation: 2.0
    mode: baseline

  # Swap used (MB) — any swap over 100MB is a hard RED.
  SWAP_USAGE_USED:
    red: 100
    direction: above
    mode: absolute

  # -----------------------------------------------------------------------
  # Section 3: Disk Resources
  # -----------------------------------------------------------------------

  # Disk read/write latency (ms). RED if above 10 ms OR 3x baseline AND
  # current value is above 2 ms. The relevance_floor of 2 ms suppresses
  # deviation-based RED when latency is still healthy in absolute terms —
  # a 6x jump from 0.16 ms to 1 ms is noise; a 6x jump from 5 ms to 30 ms
  # is a real signal.
  DISK_PARTITION_LATENCY_READ:
    red: 10.0
    warn: 5.0
    direction: above
    deviation: 3.0
    relevance_floor: 2.0
    mode: or

  DISK_PARTITION_LATENCY_WRITE:
    red: 10.0
    warn: 5.0
    direction: above
    deviation: 3.0
    relevance_floor: 2.0
    mode: or

  # Disk IOPS — RED above 950 (assumes gp2/gp3 IOPS ceiling near 1000).
  DISK_PARTITION_IOPS_READ:
    red: 950
    direction: above
    mode: absolute

  DISK_PARTITION_IOPS_WRITE:
    red: 950
    direction: above
    mode: absolute

  # Disk free space (%) — direction=below. RED below 10%, WARN below 20%.
  DISK_PARTITION_SPACE_PERCENT_FREE:
    red: 10.0
    warn: 20.0
    direction: below
    mode: absolute

  # -----------------------------------------------------------------------
  # Section 4: Cache Resources
  # -----------------------------------------------------------------------

  # WiredTiger cache used/dirty in bytes. Baseline-only because absolute
  # thresholds require knowing the configured cache size, which isn't available
  # via the read-only OM API.
  CACHE_USED_BYTES:
    deviation: 2.0
    mode: baseline

  CACHE_DIRTY_BYTES:
    deviation: 3.0
    mode: baseline

  # Cache I/O throughput (bytes/sec) — pure rate: baseline deviation with a
  # 1 MB/sec relevance_floor below which a spike is noise.
  CACHE_BYTES_READ_INTO:
    deviation: 3.0
    relevance_floor: 1000000
    mode: baseline

  CACHE_BYTES_WRITTEN_FROM:
    deviation: 3.0
    relevance_floor: 1000000
    mode: baseline

  # -----------------------------------------------------------------------
  # Section 5: Database Activity & Workload
  # -----------------------------------------------------------------------

  # Query targeting is an efficiency RATIO (docs scanned per doc returned): a
  # high ratio is bad on its own, so mode=or fires on the absolute red even when
  # steady. relevance_floor gates the deviation branch so a 2x jump on an
  # already-efficient query (5 -> 10) doesn't fire.
  QUERY_TARGETING_SCANNED_PER_RETURNED:
    red: 1000
    direction: above
    deviation: 2.0
    relevance_floor: 100
    mode: or

  QUERY_TARGETING_SCANNED_OBJECTS_PER_RETURNED:
    red: 1000
    direction: above
    deviation: 2.0
    relevance_floor: 100
    mode: or

  # ---- Pure RATE metrics (ops/s, docs/s) ---------------------------------
  # These have no "bad on its own" value — high just means busy. They use
  # mode=baseline (deviation detection) with a relevance_floor as the noise
  # floor: a spike only fires once the absolute rate is high enough to matter.
  #
  # The floors below are CONSERVATIVE, provisional defaults chosen to be quiet
  # out of the box. They are NOT right for every cluster and are expected to be
  # overridden per cluster. Two levers to tune here:
  #   - relevance_floor: raise on a low-volume cluster to cut noise; lower on a
  #     high-volume cluster so a smaller surge still registers.
  #   - deviation: 3.0 suits a low-volume / newly-online cluster; during triage
  #     on a busy cluster a deviation as low as 1.5 can be significant.

  # Query executor scan rates.
  QUERY_EXECUTOR_SCANNED:
    deviation: 3.0
    relevance_floor: 10000
    mode: baseline

  QUERY_EXECUTOR_SCANNED_OBJECTS:
    deviation: 3.0
    relevance_floor: 10000
    mode: baseline

  # Document throughput.
  DOCUMENT_METRICS_RETURNED:
    deviation: 3.0
    relevance_floor: 10000
    mode: baseline

  DOCUMENT_METRICS_INSERTED:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  DOCUMENT_METRICS_UPDATED:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  DOCUMENT_METRICS_DELETED:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  # In-memory sort operations.
  OPERATIONS_SCAN_AND_ORDER:
    deviation: 3.0
    relevance_floor: 100
    mode: baseline

  # Opcounters.
  OPCOUNTER_CMD:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  OPCOUNTER_QUERY:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  OPCOUNTER_UPDATE:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  OPCOUNTER_DELETE:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  OPCOUNTER_GETMORE:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  OPCOUNTER_INSERT:
    deviation: 3.0
    relevance_floor: 1000
    mode: baseline

  # Average operation execution time (ms). RED if above 100 ms OR 2x baseline
  # AND current value is above 20 ms. The relevance_floor of 20 ms suppresses
  # deviation-based RED when latency is still healthy in absolute terms —
  # a 4x jump from 0.34 ms to 1.55 ms is noise; a 4x jump from 30 ms to 120 ms
  # is a real signal (and the 100 ms absolute threshold also catches it).
  OP_EXECUTION_TIME_READS:
    red: 100
    warn: 50
    direction: above
    deviation: 2.0
    relevance_floor: 20
    mode: or

  OP_EXECUTION_TIME_WRITES:
    red: 100
    warn: 50
    direction: above
    deviation: 2.0
    relevance_floor: 20
    mode: or

  OP_EXECUTION_TIME_COMMANDS:
    red: 100
    warn: 50
    direction: above
    deviation: 2.0
    relevance_floor: 20
    mode: or

  # Global lock queue depth — RED if sustained queuing (> 10 readers or writers,
  # > 20 total) OR 3x baseline.
  GLOBAL_LOCK_CURRENT_QUEUE_READERS:
    red: 10
    warn: 5
    direction: above
    deviation: 3.0
    mode: or

  GLOBAL_LOCK_CURRENT_QUEUE_WRITERS:
    red: 10
    warn: 5
    direction: above
    deviation: 3.0
    mode: or

  GLOBAL_LOCK_CURRENT_QUEUE_TOTAL:
    red: 20
    warn: 10
    direction: above
    deviation: 3.0
    mode: or

  # -----------------------------------------------------------------------
  # Section 6: Replication
  # -----------------------------------------------------------------------

  # Secondary replication lag (seconds). Outside of post-restart catch-up
  # windows, lag should be near zero. RED above 10s, WARN above 2s.
  OPLOG_REPLICATION_LAG_TIME:
    red: 10
    warn: 2
    direction: above
    mode: absolute

  # Oplog window (hours of write history). Direction=below. RED below 24h,
  # WARN below 36h. Note: OM returns this in SECONDS; we convert to hours
  # at extraction so the threshold value matches the display label.
  OPLOG_MASTER_TIME:
    red: 24
    warn: 36
    direction: below
    mode: absolute

  # Oplog write rate (GB/hour) — informational only. Workload-specific, so
  # no default thresholds: surface the number, let the operator judge.
  # (Pre-2026-06-23 default was deviation=3.0 mode=baseline, which fired on
  # any 3x spike and produced noise — removed for incident-triage use.)
  OPLOG_RATE_GB_PER_HOUR:
    mode: absolute

  # -----------------------------------------------------------------------
  # Section 7: Connections
  # -----------------------------------------------------------------------

  # Total mongod connections. RED above 25000 OR 2x baseline.
  CONNECTIONS:
    red: 25000
    warn: 20000
    direction: above
    deviation: 2.0
    mode: or


# ---------------------------------------------------------------------------
# Version Information
# ---------------------------------------------------------------------------
# The version check is configured separately from metric thresholds.
version:

  # Severity applied to version-currency findings — a node below its minimum
  # safe patch version, or a cluster running mixed versions.
  #   info  (default) — track and highlight, but don't treat as an incident
  #   warn            — surface as a potential concern
  #   red             — treat an out-of-date version as an active problem
  severity: info

  # Minimum safe patch version per major.minor line. A node below its line's
  # entry is reported at the severity above. Lines listed here MERGE over the
  # built-in defaults, so you only need to include lines you want to change.
  # A major.minor line with no entry (built-in or here) produces no
  # version-currency finding.
  #
  # Minor-version lines (e.g. 8.1, 8.2, 8.3) are supported the same way as
  # major/LTS lines — each is keyed by "major.minor" and checked independently.
  # Now that the 8.x minor releases are supported (no longer rapid releases),
  # add whichever lines your fleet runs.
  #
  # 9.0 is listed pre-emptively with a 9.0.0 placeholder so the 9.0 line is
  # recognized on upgrade; bump it when real 9.0 advisories are published.
  minimum_safe_versions:
    "7.0": "7.0.37"
    "8.0": "8.0.26"
    "8.2": "8.2.11"
    "8.3": "8.3.4"
    "9.0": "9.0.0"

  # Advisory note per major.minor line, appended to a below-minimum finding
  # (e.g. the CVEs the minimum patch addresses). This text is stored ONLY here
  # — not baked into the script — so it can be updated as new advisories are
  # published without shipping a new build. Omit a line to show just
  # "X is below minimum safe version Y" with no advisory text.
  #
  # The minimums above are driven by CVE-2026-11933 (the newest and highest-
  # severity 2026 advisory); reaching them also covers the earlier 2026 batch
  # (CVE-2026-9740..9754), which was fixed at lower patch levels.
  version_notes:
    "7.0": >-
      CVE-2026-11933 (CVSS 8.8) post-auth use-after-free in server-side JS
      BSON-to-array conversion (info disclosure / DoS); also covers the earlier
      2026 crash/DoS advisories CVE-2026-9740..9754
    "8.0": >-
      CVE-2026-11933 (CVSS 8.8) post-auth use-after-free in server-side JS
      BSON-to-array conversion (info disclosure / DoS); also covers the earlier
      2026 crash/DoS advisories CVE-2026-9740..9754
    "8.2": >-
      CVE-2026-11933 (CVSS 8.8) post-auth use-after-free in server-side JS
      BSON-to-array conversion (info disclosure / DoS); also covers the earlier
      2026 crash/DoS advisories CVE-2026-9742..9754
    "8.3": >-
      CVE-2026-11933 (CVSS 8.8) post-auth use-after-free in server-side JS
      BSON-to-array conversion (info disclosure / DoS); also covers earlier 2026
      advisories incl. CVE-2026-9735 (keyfile in logs) and CVE-2026-9742..9754
